# Debounce — 50ms confirmed working for Kailh Speed Copper
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=50
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# BLE interval — 18.75ms, more conservative than default 7.5ms
CONFIG_ZMK_SPLIT_BLE_PREF_INT=15

# Position queues — larger buffers to absorb timing drift (defaults - central: 5, peripheral: 10)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=20
#CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_POSITION_QUEUE_SIZE=10

# Prospector status screens (uncomment all to use default)
#CONFIG_PROSPECTOR_STATUS_SCREEN_RADII=y
#CONFIG_PROSPECTOR_STATUS_SCREEN_FIELD=y
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y
